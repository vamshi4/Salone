name: salon_customer_app
description: Customer app for Salon Marketplace V2
version: 2.0.0+1
environment:
  sdk: '>=3.3.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  go_router: ^14.2.0
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  cached_network_image: ^3.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true
  fonts:
    - family: AppSans
      fonts:
        - asset: assets/fonts/AppSans.ttf
